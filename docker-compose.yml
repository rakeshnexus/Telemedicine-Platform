version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ruralcare_web
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - JWT_SECRET=telehealth-secure-jwt-key-prod-env
      - DATABASE_URL=postgresql://telemed_user:telemed_pass@postgres:5432/telemed_db
      - MONGODB_URI=mongodb://mongodb:27017/telemed_logs
      - REDIS_URL=redis://redis:6379
      - USE_HTTPS=false
    depends_on:
      - postgres
      - mongodb
      - redis
    restart: always

  postgres:
    image: postgres:15-alpine
    container_name: ruralcare_postgres
    environment:
      - POSTGRES_USER=telemed_user
      - POSTGRES_PASSWORD=telemed_pass
      - POSTGRES_DB=telemed_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  mongodb:
    image: mongo:6
    container_name: ruralcare_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  redis:
    image: redis:7-alpine
    container_name: ruralcare_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data:
  mongodb_data:
